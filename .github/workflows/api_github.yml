name: Postman API Tests

on:
  push:  # Run on every push
    branches: [ main ]

jobs:
  postman-tests:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3️⃣ Install Newman
      - name: Install Newman
        run: npm install -g newman

      # 4️⃣ Run Postman collection
      - name: Run Postman collection
        run: |
          mkdir -p postman-reports
          newman run postman/collection.json \
            -e postman/environment.json \
            --reporters cli,junit,html \
            --reporter-junit-export postman-reports/results.xml \
            --reporter-html-export postman-reports/results.html

      # 5️⃣ Upload results
      - name: Upload Postman reports
        uses: actions/upload-artifact@v4
        with:
          name: postman-reports
          path: postman-reports
