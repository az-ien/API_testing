name: Postman API Tests

on:
  push:
    branches: [ main ]    # Run on pushes to main branch
  pull_request:           # Also run on PRs

jobs:
  postman-tests:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3️⃣ Install Newman CLI
      - name: Install Newman
        run: npm install -g newman

      # 4️⃣ Run Postman collection
      - name: Run Postman collection
        run: |
          newman run MERRA HCD FILE API -- PROD.postman_collection.json \
            -e postman/environment.json \
            --reporters cli,junit \
            --reporter-junit-export results.xml

      # 5️⃣ Upload results as artifact
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: postman-results
          path: results.xml
